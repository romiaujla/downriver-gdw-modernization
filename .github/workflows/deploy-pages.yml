name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  pages-readiness:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.detect.outputs.configured }}
    steps:
      - name: Detect GitHub Pages availability
        id: detect
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          status=$(curl --silent --output /tmp/pages.json --write-out "%{http_code}" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")

          if [ "${status}" = "200" ]; then
            echo "configured=true" >> "${GITHUB_OUTPUT}"
            echo "GitHub Pages is enabled for ${GITHUB_REPOSITORY}."
          else
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "GitHub Pages is not enabled for ${GITHUB_REPOSITORY}; skipping deployment."
          fi

  build:
    needs: pages-readiness
    if: needs.pages-readiness.outputs.configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static UI export
        env:
          GITHUB_PAGES: "true"
        run: pnpm --filter @repo/ui build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/ui/out

  deploy:
    needs:
      - pages-readiness
      - build
    if: needs.pages-readiness.outputs.configured == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
